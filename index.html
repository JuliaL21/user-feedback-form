<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>User Feedback Form</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>📝 User Feedback</h1>
  <p class="subtitle">We'd love to hear from you — share your thoughts below.</p>

  <!-- FORM CARD -->
  <div class="card" id="form-card">
    <form id="feedback-form" novalidate>

      <!-- Name -->
      <div class="form-group" id="group-name">
        <div class="tooltip" id="tip-name">Enter your full name</div>
        <label for="name">Full Name</label>
        <input type="text" id="name" name="name" placeholder="Jane Doe" maxlength="60" autocomplete="off" />
        <div class="char-counter" id="counter-name">0 / 60</div>
        <div class="error-msg" id="err-name">⚠ Name is required.</div>
      </div>

      <!-- Email -->
      <div class="form-group" id="group-email">
        <div class="tooltip" id="tip-email">Enter a valid email address</div>
        <label for="email">Email Address</label>
